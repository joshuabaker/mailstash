name = "mailstash"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]

[[d1_databases]]
binding = "DB"
database_name = "mailstash"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "../../schema/migrations"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "mailstash"
